<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PolyChat – Legal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .logo {
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }
    .logo span { color: #c084fc; }
    .subtitle {
      font-size: 14px;
      color: #555;
      margin-bottom: 48px;
    }
    .cards {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    a.card {
      display: block;
      background: #13131a;
      border: 1px solid #1e1e2e;
      border-radius: 16px;
      padding: 28px 36px;
      text-decoration: none;
      text-align: center;
      transition: border-color 0.2s, transform 0.2s;
      min-width: 180px;
    }
    a.card:hover {
      border-color: #c084fc;
      transform: translateY(-2px);
    }
    .card-icon { font-size: 28px; margin-bottom: 12px; }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }
    .card-desc {
      font-size: 12px;
      color: #555;
      margin-top: 4px;
    }
    footer {
      margin-top: 60px;
      font-size: 12px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="logo">Poly<span>Chat</span></div>
  <p class="subtitle">Legal Documents</p>

  <div class="cards">
    <a class="card" href="terms.html">
      <div class="card-icon">📄</div>
      <div class="card-title">Terms of Use</div>
      <div class="card-desc">Usage rules & conditions</div>
    </a>
    <a class="card" href="privacy.html">
      <div class="card-icon">🔒</div>
      <div class="card-title">Privacy Policy</div>
      <div class="card-desc">How we handle your data</div>
    </a>
  </div>

  <footer>© 2026 PolyChat. All rights reserved.</footer>
</body>
</html>
